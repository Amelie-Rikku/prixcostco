name: Deploy prixQC to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: .
          file_pattern: dist/
          disable_globbing: true
          commit_message: "ci: deploy to gh-pages"
          create_branch: true
          push_options: --force
          branch: gh-pages
